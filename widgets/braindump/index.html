<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain dump</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.w { background: #1a1917; color: #e4dfd8; border-radius: 14px; padding: 20px 18px; }
.sec-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #4e4a46; font-weight: 500; margin-bottom: 10px; }
.task { display: flex; align-items: flex-start; gap: 9px; padding: 6px 0; border-bottom: .5px solid #222120; cursor: pointer; user-select: none; }
.task:last-child { border-bottom: none; }
.cb { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #363330; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cb.done { border-color: transparent; }
.cb.done::after { content: ''; width: 6px; height: 3.5px; border-left: 1.5px solid #1a1917; border-bottom: 1.5px solid #1a1917; transform: rotate(-45deg) translateY(-1px); display: block; }
.task-text { font-size: 12.5px; color: #b8b2aa; flex: 1; line-height: 1.5; transition: color .15s; }
.task-text.done { color: #363330; text-decoration: line-through; }
.tag { font-size: 9px; padding: 2px 6px; border-radius: 99px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
.t-admin { background: #2a2014; color: #a06828; }
.t-low { background: #1c1a28; color: #6e68a8; }
.t-quick { background: #182018; color: #488048; }
.t-creative { background: #241a28; color: #9068a8; }
.btn { margin-top: 12px; font-size: 11px; color: #4e4a46; background: none; border: .5px solid #262422; border-radius: 8px; padding: 5px 10px; cursor: pointer; display: block; }
.loading { font-size: 12px; color: #4e4a46; padding: 8px 0; }
</style>
</head>
<body>
<div class="w">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <p class="sec-label" style="margin:0">brain dump — today</p>
    <span id="sync-time" style="font-size:10px;color:#3a3835"></span>
  </div>
  <div id="tasks-list"><p class="loading">loading tasks...</p></div>
  <button class="btn" onclick="loadTasks()">refresh ↺</button>
</div>
<script>
const SKEY = 'studio_braindump_v1';
const TODAY = new Date().toDateString();
const TAG_COLORS = {
  'low-energy': 't-low',
  'quick-win': 't-quick',
  'admin': 't-admin',
  'creative': 't-creative'
};

function getState() {
  try {
    const s = JSON.parse(localStorage.getItem(SKEY) || 'null');
    if (!s || s.date !== TODAY) return { date: TODAY, done: [], tasksDone: 0 };
    return s;
  } catch(e) { return { date: TODAY, done: [], tasksDone: 0 }; }
}
function save(s) { try { localStorage.setItem(SKEY, JSON.stringify(s)); } catch(e) {} }

let currentTasks = [];

async function loadTasks() {
  const list = document.getElementById('tasks-list');
  list.innerHTML = '<p class="loading">syncing from ticktick...</p>';
  try {
    const resp = await fetch('https://jamorac.github.io/gadgets_workingmom/widgets/braindump/tasks.json?v=' + Date.now());
    const data = await resp.json();
    currentTasks = data.tasks || [];
    renderTasks(currentTasks);
    const el = document.getElementById('sync-time');
    if (el && data.updated) el.textContent = 'synced ' + new Date(data.updated).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    renderFallback();
  }
}

function renderFallback() {
  const fallback = [
    { title: 'Apply for Noah\'s social security', tag: 'admin' },
    { title: 'Check embassy appt for Noah', tag: 'low-energy' },
    { title: 'Look at flight tickets', tag: 'quick-win' }
  ];
  currentTasks = fallback;
  renderTasks(fallback);
}

function renderTasks(tasks) {
  const st = getState();
  const list = document.getElementById('tasks-list');
  const top3 = tasks.slice(0, 3);
  list.innerHTML = top3.map((t, i) => {
    const isDone = st.done.includes(t.title);
    const tagClass = TAG_COLORS[t.tag] || '';
    const tagHtml = t.tag ? `<span class="tag ${tagClass}">#${t.tag}</span>` : '';
    return `<div class="task" onclick="tickTask(this,'${t.title.replace(/'/g,"&#39;")}')">
      <div class="cb${isDone?' done':''}" style="${isDone?'background:#5a9a7a;border-color:transparent':''}"></div>
      <span class="task-text${isDone?' done':''}">${t.title}</span>
      ${tagHtml}
    </div>`;
  }).join('');
}

function tickTask(el, title) {
  const cb = el.querySelector('.cb');
  const txt = el.querySelector('.task-text');
  if (!cb || !txt) return;
  const isDone = cb.classList.toggle('done');
  txt.classList.toggle('done', isDone);
  cb.style.background = isDone ? '#5a9a7a' : '';
  cb.style.borderColor = isDone ? '#5a9a7a' : 'transparent';
  if (isDone) cb.style.borderColor = 'transparent';
  const st = getState();
  if (isDone) { if (!st.done.includes(title)) st.done.push(title); st.tasksDone = (st.tasksDone||0) + 1; }
  else { st.done = st.done.filter(d => d !== title); st.tasksDone = Math.max(0,(st.tasksDone||1)-1); }
  save(st);
  try { localStorage.setItem('studio_tasks_done_total', String(getTotalTasksDone())); } catch(e) {}
}

function getTotalTasksDone() {
  try {
    const prev = parseInt(localStorage.getItem('studio_tasks_done_total') || '0');
    return prev;
  } catch(e) { return 0; }
}

loadTasks();
</script>
</body>
</html>
