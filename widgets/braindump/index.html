<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain dump</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.w { color: #e4dfd8; padding: 4px 2px; }
.sec-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #4e4a46; font-weight: 500; margin-bottom: 10px; }
.task { display: flex; align-items: flex-start; gap: 9px; padding: 6px 0; border-bottom: .5px solid #2a2826; cursor: pointer; user-select: none; }
.task:last-child { border-bottom: none; }
.cb { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #3a3734; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cb.done { border-color: transparent; }
.cb.done::after { content: ''; width: 6px; height: 3.5px; border-left: 1.5px solid #191817; border-bottom: 1.5px solid #191817; transform: rotate(-45deg) translateY(-1px); display: block; }
.task-text { font-size: 12.5px; color: #b8b2aa; flex: 1; line-height: 1.5; transition: color .15s; }
.task-text.done { color: #363330; text-decoration: line-through; }
.tag { font-size: 9px; padding: 2px 6px; border-radius: 99px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
.t-admin { background: #2a2014; color: #a06828; }
.t-low { background: #1c1a28; color: #6e68a8; }
.t-quick { background: #182018; color: #488048; }
.t-creative { background: #241a28; color: #9068a8; }
.btn { margin-top: 12px; font-size: 11px; color: #4e4a46; background: none; border: .5px solid #2e2c2a; border-radius: 8px; padding: 5px 10px; cursor: pointer; display: block; }
.loading { font-size: 12px; color: #4e4a46; padding: 8px 0; }
</style>
</head>
<body>
<div class="w">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <p class="sec-label" style="margin:0">brain dump &#8212; today</p>
    <span id="sync-time" style="font-size:10px;color:#3a3835"></span>
  </div>
  <div id="tasks-list"><p class="loading">loading tasks...</p></div>
  <button class="btn" onclick="loadTasks()">refresh &#8635;</button>
</div>
<script>
function setBackground() {
  try {
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.style.background = isDark ? '#191919' : '#ffffff';
  } catch(e) {
    document.body.style.background = '#ffffff';
  }
}
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addListener(setBackground);
}
setBackground();

const SKEY = 'studio_braindump_v1';
const TODAY = new Date().toDateString();
const TAG_COLORS = { 'low-energy':'t-low', 'quick-win':'t-quick', 'admin':'t-admin', 'creative':'t-creative' };
function getState() {
  try {
    const s = JSON.parse(localStorage.getItem(SKEY) || 'null');
    if (!s || s.date !== TODAY) return { date: TODAY, done: [], tasksDone: 0 };
    return s;
  } catch(e) { return { date: TODAY, done: [], tasksDone: 0 }; }
}
function save(s) { try { localStorage.setItem(SKEY, JSON.stringify(s)); } catch(e) {} }
let currentTasks = [];
async function loadTasks() {
  const list = document.getElementById('tasks-list');
  list.innerHTML = '<p class="loading">syncing...</p>';
  try {
    const resp = await fetch('https://jamorac.github.io/gadgets_workingmom/widgets/braindump/tasks.json?v=' + Date.now());
    const data = await resp.json();
    currentTasks = data.tasks || [];
    if (currentTasks.length === 0) { renderFallback(); return; }
    renderTasks(currentTasks);
    const el = document.getElementById('sync-time');
    if (el && data.updated) el.textContent = 'synced ' + new Date(data.updated).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  } catch(e) { renderFallback(); }
}
function renderFallback() {
  document.getElementById('tasks-list').innerHTML = '<p class="loading" style="color:#3a3835">no tasks &#8212; check back later</p>';
}
function renderTasks(tasks) {
  const st = getState();
  const top3 = tasks.slice(0,3);
  document.getElementById('tasks-list').innerHTML = top3.map(t => {
    const isDone = st.done.includes(t.title);
    const tagClass = TAG_COLORS[t.tag] || '';
    const tagHtml = t.tag ? `<span class="tag ${tagClass}">#${t.tag}</span>` : '';
    return `<div class="task" onclick="tickTask(this,'${t.title.replace(/'/g,"&#39;")}')">
      <div class="cb${isDone?' done':''}" style="${isDone?'background:#5a9a7a;border-color:transparent':''}"></div>
      <span class="task-text${isDone?' done':''}">${t.title}</span>${tagHtml}</div>`;
  }).join('');
}
function tickTask(el, title) {
  const cb = el.querySelector('.cb'), txt = el.querySelector('.task-text');
  if (!cb || !txt) return;
  const isDone = cb.classList.toggle('done'); txt.classList.toggle('done', isDone);
  cb.style.background = isDone ? '#5a9a7a' : '';
  cb.style.borderColor = isDone ? 'transparent' : '';
  const st = getState();
  if (isDone) { if (!st.done.includes(title)) st.done.push(title); st.tasksDone = (st.tasksDone||0)+1; }
  else { st.done = st.done.filter(d => d !== title); st.tasksDone = Math.max(0,(st.tasksDone||1)-1); }
  save(st);
  try {
    const total = parseInt(localStorage.getItem('studio_tasks_done_total')||'0');
    localStorage.setItem('studio_tasks_done_total', String(Math.max(0, total + (isDone?1:-1))));
  } catch(e) {}
}
loadTasks();
</script>
</body>
</html>
