<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow: hidden; }
  body { font-family: 'DM Mono', monospace; padding: 10px 14px; }

  .widget { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 0; }

  .day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 6px 4px;
  }
  .day + .day { border-left: 0.5px solid var(--border); padding-left: 10px; }

  .day-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .moon-face { width: 36px; height: 36px; }
  .phase-name {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--sub);
    text-align: left;
    line-height: 1.2;
  }
  .illumination {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="row" id="moon-row"></div>
</div>
<script>
  function setTheme() {
    try {
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.body.style.background = dark ? '#191919' : '#ffffff';
      document.documentElement.style.setProperty('--text', dark ? '#e8e0d8' : '#2a2218');
      document.documentElement.style.setProperty('--sub', dark ? '#a09080' : '#6b5a4e');
      document.documentElement.style.setProperty('--muted', dark ? '#6a5a50' : '#9e8e82');
      document.documentElement.style.setProperty('--border', dark ? '#333' : '#e0d8d0');
      document.documentElement.style.setProperty('--moon-bg', dark ? '#2a2520' : '#f5f0e8');
      document.documentElement.style.setProperty('--moon-lit', dark ? '#e8d8b0' : '#f0c840');
      document.documentElement.style.setProperty('--moon-dark', dark ? '#191919' : '#c8bca8');
    } catch(e) {}
  }
  if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addListener(setTheme);
  setTheme();

  function getMoonPhase(date) {
    const known = new Date(2000, 0, 6, 18, 14, 0);
    const synodic = 29.530588853;
    const diff = (date - known) / (1000 * 60 * 60 * 24);
    let age = diff % synodic;
    if (age < 0) age += synodic;
    const illumination = Math.round((1 - Math.cos((age / synodic) * 2 * Math.PI)) / 2 * 100);
    let name, svgPhase;
    const p = age / synodic;
    if (p < 0.025 || p >= 0.975)      { name = 'New Moon';        svgPhase = 'new'; }
    else if (p < 0.25)                { name = 'Waxing Crescent'; svgPhase = 'waxing-crescent'; }
    else if (p < 0.275)               { name = 'First Quarter';   svgPhase = 'first-quarter'; }
    else if (p < 0.475)               { name = 'Waxing Gibbous';  svgPhase = 'waxing-gibbous'; }
    else if (p < 0.525)               { name = 'Full Moon';       svgPhase = 'full'; }
    else if (p < 0.725)               { name = 'Waning Gibbous';  svgPhase = 'waning-gibbous'; }
    else if (p < 0.775)               { name = 'Last Quarter';    svgPhase = 'last-quarter'; }
    else                              { name = 'Waning Crescent'; svgPhase = 'waning-crescent'; }
    return { name, illumination, svgPhase, age };
  }

  function moonSVG(phase) {
    const size = 36, r = 14, cx = 18, cy = 18;
    const lit = 'var(--moon-lit)', dark = 'var(--moon-dark)', bg = 'var(--moon-bg)';
    let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${bg}" />`;
    if (phase === 'new') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}" opacity="0.85"/>`;
    } else if (phase === 'full') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${lit}"/>`;
    } else if (phase === 'first-quarter') {
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} L${cx},${cy-r}" fill="${lit}"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} L${cx},${cy-r}" fill="${dark}" opacity="0.85"/>`;
    } else if (phase === 'last-quarter') {
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} L${cx},${cy-r}" fill="${lit}"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} L${cx},${cy-r}" fill="${dark}" opacity="0.85"/>`;
    } else if (phase === 'waxing-crescent') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}" opacity="0.85"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} A${r*0.5},${r} 0 0,0 ${cx},${cy-r}" fill="${lit}"/>`;
    } else if (phase === 'waxing-gibbous') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${lit}"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} A${r*0.5},${r} 0 0,1 ${cx},${cy-r}" fill="${dark}" opacity="0.85"/>`;
    } else if (phase === 'waning-gibbous') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${lit}"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} A${r*0.5},${r} 0 0,0 ${cx},${cy-r}" fill="${dark}" opacity="0.85"/>`;
    } else if (phase === 'waning-crescent') {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}" opacity="0.85"/>`;
      svg += `<path d="M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} A${r*0.5},${r} 0 0,1 ${cx},${cy-r}" fill="${lit}"/>`;
    }
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`;
    svg += `</svg>`;
    return svg;
  }

  function dayLabel(offset) {
    if (offset === 0) return 'tonight';
    if (offset === 1) return 'tomorrow';
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();
  }

  function render() {
    const row = document.getElementById('moon-row');
    row.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const date = new Date();
      date.setDate(date.getDate() + i);
      const { name, illumination, svgPhase } = getMoonPhase(date);
      const div = document.createElement('div');
      div.className = 'day';
      div.innerHTML = `
        <div class="day-label">${dayLabel(i)}</div>
        <div class="moon-face">${moonSVG(svgPhase)}</div>
        <div class="phase-name">${name}</div>
        <div class="illumination">${illumination}% lit</div>
      `;
      row.appendChild(div);
    }
  }

  render();
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
  setTimeout(() => { render(); setInterval(render, 24 * 60 * 60 * 1000); }, msToMidnight);
</script>
</body>
</html>
