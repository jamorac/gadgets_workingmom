<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>intentions</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.w { color: #e4dfd8; padding: 4px 2px; }
.sec-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #4e4a46; font-weight: 500; }
.int-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.int-title { display: flex; align-items: center; gap: 6px; }
.int-emoji { font-size: 13px; }
.int-hint { font-size: 11px; color: #7a7470; font-weight: 500; }
.int-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.goal-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px; cursor: pointer; user-select: none; transition: background .15s; }
.goal-item:hover { background: rgba(255,255,255,.04); }
.goal-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid #3a3734; flex-shrink: 0; transition: all .2s; }
.goal-dot.done { background: #5a9a7a; border-color: #5a9a7a; }
.goal-text { font-size: 12.5px; color: #8a8480; line-height: 1.4; transition: color .15s; }
.goal-text.done { color: #5a9a7a; font-weight: 500; }
</style>
</head>
<body>
<div class="w">
  <div class="int-header">
    <div class="int-title">
      <span class="int-emoji">✦</span>
      <span class="sec-label" style="margin:0">intentions</span>
    </div>
    <span class="int-hint" id="int-hint">pick a few</span>
  </div>
  <div class="int-grid">
    <div class="goal-item" onclick="toggleGoal(this,'paddy-train')"><div class="goal-dot"></div><span class="goal-text">paddy training</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'paddy-walk')"><div class="goal-dot"></div><span class="goal-text">paddy + noah walk</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'baby-activity')"><div class="goal-dot"></div><span class="goal-text">baby activity with noah</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'upskill')"><div class="goal-dot"></div><span class="goal-text">upskill something</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'friend-text')"><div class="goal-dot"></div><span class="goal-text">write or text a friend</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'smoothie')"><div class="goal-dot"></div><span class="goal-text">healthy smoothie</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'photo')"><div class="goal-dot"></div><span class="goal-text">take a picture</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'face-mask')"><div class="goal-dot"></div><span class="goal-text">face mask</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'hair-mask')"><div class="goal-dot"></div><span class="goal-text">hair mask</span></div>
    <div class="goal-item" onclick="toggleGoal(this,'move-body')"><div class="goal-dot"></div><span class="goal-text">move your body</span></div>
  </div>
</div>
<script>
function setBackground() {
  try {
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.style.background = isDark ? '#191919' : '#ffffff';
  } catch(e) {
    document.body.style.background = '#ffffff';
  }
}
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addListener(setBackground);
}
setBackground();

const IKEY = 'studio_intentions_v1';
const TODAY = new Date().toDateString();

function getState() {
  try {
    const s = JSON.parse(localStorage.getItem(IKEY) || 'null');
    if (!s || s.date !== TODAY) return { date: TODAY, selected: [] };
    return s;
  } catch(e) { return { date: TODAY, selected: [] }; }
}

function save(s) { try { localStorage.setItem(IKEY, JSON.stringify(s)); } catch(e) {} }

function toggleGoal(el, id) {
  const dot = el.querySelector('.goal-dot'), txt = el.querySelector('.goal-text');
  if (!dot || !txt) return;
  
  const state = getState();
  const isDone = dot.classList.toggle('done');
  txt.classList.toggle('done', isDone);
  
  if (isDone) {
    if (!state.selected.includes(id)) state.selected.push(id);
  } else {
    state.selected = state.selected.filter(x => x !== id);
  }
  
  save(state);
  updateHint(state.selected.length);
}

function updateHint(count) {
  const hint = document.getElementById('int-hint');
  if (!hint) return;
  hint.textContent = count === 0 ? 'pick a few' : count + ' chosen';
}

function init() {
  const state = getState();
  const items = document.querySelectorAll('.goal-item');
  items.forEach((item, i) => {
    const id = item.getAttribute('onclick').match(/'([^']+)'/)[1];
    if (state.selected.includes(id)) {
      const dot = item.querySelector('.goal-dot'), txt = item.querySelector('.goal-text');
      dot.classList.add('done');
      txt.classList.add('done');
    }
  });
  updateHint(state.selected.length);
}

init();
</script>
</body>
</html>
