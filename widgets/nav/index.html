<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nav</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
.nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; padding: 20px 0 8px; }
.col { padding: 0 20px 0 0; }
.col-title {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #c8c2ba;
  font-weight: 500;
  margin-bottom: 14px;
  display: block;
}
.col-links { display: flex; flex-direction: column; gap: 7px; }
.link {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12.5px;
  color: #6a6460;
  text-decoration: none;
  cursor: pointer;
  transition: color .15s;
  user-select: none;
}
.link:hover { color: #a09890; }
.link-icon { font-size: 13px; flex-shrink: 0; }
.placeholder {
  font-size: 11px;
  color: #3a3835;
  font-style: italic;
  padding: 3px 0;
}
.divider {
  height: .5px;
  background: #262422;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="divider"></div>

<div class="nav">

  <div class="col">
    <span class="col-title">i d e a s</span>
    <div class="col-links">
      <span class="placeholder">coming soon...</span>
    </div>
  </div>

  <div class="col">
    <span class="col-title">p r o j e c t s</span>
    <div class="col-links">
      <span class="placeholder">coming soon...</span>
    </div>
  </div>

  <div class="col">
    <span class="col-title">h o m e  l i f e</span>
    <div class="col-links">
      <span class="placeholder">coming soon...</span>
    </div>
  </div>

  <div class="col">
    <span class="col-title">b r a i n  d u m p</span>
    <div class="col-links">
      <span class="placeholder">coming soon...</span>
    </div>
  </div>

</div>

</body>
</html>
