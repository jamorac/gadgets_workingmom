<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>progress</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.w { color: #e4dfd8; padding: 4px 2px; }
.sec-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #4e4a46; font-weight: 500; margin-bottom: 12px; }

/* week grid */
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; }
.week-day { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.week-label { font-size: 10px; color: #4e4a46; text-transform: uppercase; letter-spacing: .05em; }

/* progress bars */
.routine-section { margin-bottom: 18px; }
.routine-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.routine-title { font-size: 11px; color: #7a7470; }
.routine-count { font-size: 11px; color: #5a5652; font-weight: 500; }
.bar-track { width: 100%; height: 10px; background: #2a2826; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

.divider { height: .5px; background: #2e2c2a; margin: 4px 0 18px; }

/* summary section */
.summary-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
.summary-period { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: #4e4a46; width: 44px; flex-shrink: 0; padding-top: 2px; }
.summary-counts { display: flex; gap: 0; align-items: baseline; flex: 1; }
.summary-num { font-size: 20px; font-weight: 600; line-height: 1; }
.summary-num.morning { color: #9a8060; }
.summary-num.night { color: #7a72c0; }
.summary-sep { font-size: 14px; color: #3a3734; margin: 0 6px; line-height: 1; }
.summary-sub { display: flex; gap: 0; align-items: center; font-size: 9px; color: #4e4a46; letter-spacing: .05em; margin-top: 2px; }
.summary-sub-morning { color: #5a4a36; }
.summary-sub-night { color: #4a4276; }
.summary-sub-sep { color: #2e2c2a; margin: 0 6px; }
.summary-col { display: flex; flex-direction: column; gap: 2px; }
</style>
</head>
<body>
<div class="w">
  <p class="sec-label">this week's progress</p>
  <div class="week-grid" id="week-grid"></div>

  <div class="divider"></div>

  <div class="routine-section">
    <div class="routine-header">
      <span class="routine-title">&#9728;&#65039; wake up</span>
      <span class="routine-count" id="mf-count">0 / 7</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="mf-bar" style="background:#9a8060;width:0%"></div></div>
  </div>

  <div class="routine-section">
    <div class="routine-header">
      <span class="routine-title">&#127800; right side of bed</span>
      <span class="routine-count" id="mb-count">0 / 11</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="mb-bar" style="background:#5a9a7a;width:0%"></div></div>
  </div>

  <div class="routine-section">
    <div class="routine-header">
      <span class="routine-title">&#127769; wind down</span>
      <span class="routine-count" id="ef-count">0 / 4</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="ef-bar" style="background:#9a8060;width:0%"></div></div>
  </div>

  <div class="routine-section">
    <div class="routine-header">
      <span class="routine-title">&#127807; unwind</span>
      <span class="routine-count" id="eb-count">0 / 2</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="eb-bar" style="background:#7a72c0;width:0%"></div></div>
  </div>

  <div class="divider"></div>

  <!-- summary: weekly / monthly / yearly -->
  <div id="summary-section">
    <div class="summary-row">
      <span class="summary-period">weekly</span>
      <div class="summary-col">
        <div class="summary-counts">
          <span class="summary-num morning" id="w-morning">0</span>
          <span class="summary-sep">|</span>
          <span class="summary-num night" id="w-night">0</span>
        </div>
        <div class="summary-sub">
          <span class="summary-sub-morning">morning</span>
          <span class="summary-sub-sep">|</span>
          <span class="summary-sub-night">night</span>
        </div>
      </div>
    </div>

    <div class="summary-row">
      <span class="summary-period">monthly</span>
      <div class="summary-col">
        <div class="summary-counts">
          <span class="summary-num morning" id="m-morning">0</span>
          <span class="summary-sep">|</span>
          <span class="summary-num night" id="m-night">0</span>
        </div>
        <div class="summary-sub">
          <span class="summary-sub-morning">morning</span>
          <span class="summary-sub-sep">|</span>
          <span class="summary-sub-night">night</span>
        </div>
      </div>
    </div>

    <div class="summary-row">
      <span class="summary-period">yearly</span>
      <div class="summary-col">
        <div class="summary-counts">
          <span class="summary-num morning" id="y-morning">0</span>
          <span class="summary-sep">|</span>
          <span class="summary-num night" id="y-night">0</span>
        </div>
        <div class="summary-sub">
          <span class="summary-sub-morning">morning</span>
          <span class="summary-sub-sep">|</span>
          <span class="summary-sub-night">night</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function setBackground() {
  try {
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.style.background = isDark ? '#191919' : '#ffffff';
  } catch(e) { document.body.style.background = '#ffffff'; }
}
if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addListener(setBackground);
setBackground();

const TODAY = new Date().toDateString();
const DAYS = ['sun','mon','tue','wed','thu','fri','sat'];
const MF_TOTAL = 7, MB_TOTAL = 11, EF_TOTAL = 4, EB_TOTAL = 2;

function getMorning(dateStr) {
  try {
    const s = JSON.parse(localStorage.getItem('studio_morning_v1') || 'null');
    if (!s || s.date !== dateStr) return { mfCount: 0, mbCount: 0 };
    return {
      mfCount: s.mfCount !== undefined ? s.mfCount : (s.mfDone ? 7 : 0),
      mbCount: s.mbCount !== undefined ? s.mbCount : 0
    };
  } catch(e) { return { mfCount: 0, mbCount: 0 }; }
}

function getEvening(dateStr) {
  try {
    const s = JSON.parse(localStorage.getItem('studio_evening_v1') || 'null');
    if (!s || s.date !== dateStr) return { efCount: 0, ebCount: 0 };
    return {
      efCount: s.efCount !== undefined ? s.efCount : 0,
      ebCount: s.ebCount !== undefined ? s.ebCount : 0
    };
  } catch(e) { return { efCount: 0, ebCount: 0 }; }
}

// returns { morning: bool, night: bool } for a given dateStr
function getDayCompletion(dateStr) {
  const m = getMorning(dateStr);
  const e = getEvening(dateStr);
  return {
    morning: (m.mfCount + m.mbCount) > 0,
    night: (e.efCount + e.ebCount) > 0
  };
}

function getDotState(dateStr) {
  const isToday = dateStr === TODAY;
  const m = getMorning(dateStr);
  const e = getEvening(dateStr);
  const totalDone = m.mfCount + m.mbCount + e.efCount + e.ebCount;
  const allDone = m.mfCount >= MF_TOTAL && m.mbCount >= MB_TOTAL && e.efCount >= EF_TOTAL && e.ebCount >= EB_TOTAL;

  if (allDone) return 'complete';
  if (isToday && totalDone > 0) return 'inprogress';
  if (!isToday && totalDone > 0) return 'partial';
  return 'nothing';
}

function renderDot(state, isToday) {
  const size = 16, r = size / 2;
  const todayRing = isToday ? `<circle cx="${r}" cy="${r}" r="${r - 1}" fill="none" stroke="#4e4a46" stroke-width="1" stroke-dasharray="2 2"/>` : '';

  if (state === 'nothing') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${r}" cy="${r}" r="${r - 1.5}" fill="none" stroke="#3a3734" stroke-width="1.5"/>${todayRing}</svg>`;
  }
  if (state === 'inprogress') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${r}" cy="${r}" r="${r - 1.5}" fill="none" stroke="#e8a838" stroke-width="1.5"/><circle cx="${r}" cy="${r}" r="4" fill="#e8a838"/>${todayRing}</svg>`;
  }
  if (state === 'partial') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${r}" cy="${r}" r="${r - 1.5}" fill="none" stroke="#a8d4a5" stroke-width="1.5"/><circle cx="${r}" cy="${r}" r="5" fill="#a8d4a5"/>${todayRing}</svg>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${r}" cy="${r}" r="${r}" fill="#5a9a7a"/>${todayRing}</svg>`;
}

function renderWeekGrid() {
  const el = document.getElementById('week-grid'); if (!el) return;
  const now = new Date(), todayDow = now.getDay();
  el.innerHTML = DAYS.map((d, i) => {
    const day = new Date(now);
    day.setDate(now.getDate() - todayDow + i);
    const ds = day.toDateString();
    const isToday = ds === TODAY;
    const state = getDotState(ds);
    return `<div class="week-day">${renderDot(state, isToday)}<span class="week-label" style="color:${isToday ? '#8a8480' : '#4e4a46'}">${d}</span></div>`;
  }).join('');
}

function renderBars() {
  const m = getMorning(TODAY);
  const e = getEvening(TODAY);

  document.getElementById('mf-count').textContent = m.mfCount + ' / ' + MF_TOTAL;
  document.getElementById('mf-bar').style.width = Math.min(100, Math.round(m.mfCount / MF_TOTAL * 100)) + '%';

  document.getElementById('mb-count').textContent = m.mbCount + ' / ' + MB_TOTAL;
  document.getElementById('mb-bar').style.width = Math.min(100, Math.round(m.mbCount / MB_TOTAL * 100)) + '%';

  document.getElementById('ef-count').textContent = e.efCount + ' / ' + EF_TOTAL;
  document.getElementById('ef-bar').style.width = Math.min(100, Math.round(e.efCount / EF_TOTAL * 100)) + '%';

  document.getElementById('eb-count').textContent = e.ebCount + ' / ' + EB_TOTAL;
  document.getElementById('eb-bar').style.width = Math.min(100, Math.round(e.ebCount / EB_TOTAL * 100)) + '%';
}

function getDateRange(type) {
  const now = new Date();
  const dates = [];

  if (type === 'week') {
    const dow = now.getDay();
    for (let i = 0; i < 7; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() - dow + i);
      dates.push(d.toDateString());
    }
  } else if (type === 'month') {
    const y = now.getFullYear(), mo = now.getMonth();
    const daysInMonth = new Date(y, mo + 1, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
      dates.push(new Date(y, mo, i).toDateString());
    }
  } else if (type === 'year') {
    const y = now.getFullYear();
    for (let mo = 0; mo < 12; mo++) {
      const daysInMonth = new Date(y, mo + 1, 0).getDate();
      for (let i = 1; i <= daysInMonth; i++) {
        dates.push(new Date(y, mo, i).toDateString());
      }
    }
  }
  return dates;
}

function countCompletions(dates) {
  let morning = 0, night = 0;
  for (const ds of dates) {
    const c = getDayCompletion(ds);
    if (c.morning) morning++;
    if (c.night) night++;
  }
  return { morning, night };
}

function renderSummary() {
  const periods = ['week', 'month', 'year'];
  const ids = { week: 'w', month: 'm', year: 'y' };
  for (const p of periods) {
    const dates = getDateRange(p);
    const { morning, night } = countCompletions(dates);
    document.getElementById(ids[p] + '-morning').textContent = morning;
    document.getElementById(ids[p] + '-night').textContent = night;
  }
}

function refresh() {
  renderWeekGrid();
  renderBars();
  renderSummary();
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
